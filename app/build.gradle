plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'com.example.eventsystem'
    compileSdk 35

    defaultConfig {
        applicationId 'com.example.eventsystem'
        minSdk 23
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    // Keep Java and Kotlin on the same target without requiring a separate JDK toolchain.
    // Android Studio can build this using its bundled JDK.
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }
}
